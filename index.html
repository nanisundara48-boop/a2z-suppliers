<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A2Z Suppliers - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="app"></div>

    <script>
        // 1. Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyDPB0Twga_QZGwPZXvlRW5y2bhOD2zU4eQ",
            projectId: "a2zsuppliers-ef2fc",
            storageBucket: "a2zsuppliers-ef2fc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Main Logic (Admin & Customer in 1 file)
        function render() {
            const isAdmin = window.location.hash === '#admin';
            document.getElementById('app').innerHTML = isAdmin ? renderAdmin() : renderCustomer();
            lucide.createIcons();
        }

        function renderCustomer() {
            return `
                <nav class="bg-white p-4 flex justify-between shadow">
                    <h1 class="font-bold text-xl">A2Z Suppliers</h1>
                    <a href="#admin" class="bg-blue-600 text-white px-4 py-1 rounded">Admin</a>
                </nav>
                <div id="grid" class="grid grid-cols-2 gap-4 p-4"></div>
            `;
        }

        function renderAdmin() {
            return `
                <div class="p-6">
                    <h2 class="text-2xl font-bold mb-4">Admin Panel</h2>
                    <input id="name" placeholder="Name" class="w-full border p-2 mb-2"><br>
                    <input id="price" placeholder="Price" class="w-full border p-2 mb-2"><br>
                    <button onclick="addProduct()" class="bg-green-600 text-white px-4 py-2">Add Product</button>
                    <br><br><a href="#" class="text-blue-500">Back to Store</a>
                </div>
            `;
        }

        async function addProduct() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            await db.collection('products').add({ name, price, createdAt: new Date() });
            alert("Added!");
        }

        // Real-time listener
        db.collection('products').onSnapshot(snap => {
            const grid = document.getElementById('grid');
            if(grid) {
                grid.innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-2 rounded shadow">
                        <h3>${doc.data().name}</h3>
                        <p>₹${doc.data().price}</p>
                    </div>
                `).join('');
            }
        });

        render();
        window.onhashchange = render;
    </script>
</body>
</html>
